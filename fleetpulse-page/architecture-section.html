<style>

}

}

}

  height: auto;
  display: block;
}
.fp-arch-pills {
  display: flex;

}
.fp-arch-pill-dot {

  height: 10px;
  border-radius: 50%;

}
@media (max-width: 768px) {
  #fp-arch { padding: 60px 20px; }
  #fp-arch h2 { font-size: 26px; }
  .fp-arch-pills { gap: 10px; }
  .fp-arch-pill { font-size: 12px; padding: 6px 14px; }
}
